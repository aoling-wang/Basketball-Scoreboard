<html>
    <head>
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <div class="scoreContainer">
            <div class="scoreCounter">
                <h3 class="title">HOME</h3>
                <p id="homeScore">0</p>
                <div class="buttons">
                    <button class="btn" onclick="add1PointHome()">+1</button>
                    <button class="btn" onclick="add2PointsHome()">+2</button>
                    <button class="btn" onclick="add3PointsHome()">+3</button>
                </div>
            </div>
            <div class="scoreCounter">
                <h3 class="title">AWAY</h3>
                <p id="awayScore">0</p>
                <div class="buttons">
                    <button class="btn" onclick="add1PointAway()">+1</button>
                    <button class="btn" onclick="add2PointsAway()">+2</button>
                    <button class="btn" onclick="add3PointsAway()">+3</button>
                </div>
            </div>
        </div>
        <div class="configContainer">
            <button id="newGame" onclick="scoreReset()">NEW GAME</button>
            <div class="counter">
                <button class="btn" id="minus1PeriodButton" onclick="minus1Period()">-</button>
                <p id="periodCounter">0</p>
                <button class="btn" id="plus1PeriodButton" onclick="plus1Period()">+</button>
            </div>
            <div class="counter">
                <button class="btn" id="minus1FoulButton" onclick="minus1Foul()">-</button>
                <p id="foulCounter">0</p>
                <button class="btn" id="plus1FoulButton" onclick="plus1Foul()">+</button>
            </div>
        </div>
        <script src="index.js"></script>
    </body>
</html>
